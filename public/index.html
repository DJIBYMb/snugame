
<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>SNUGAME</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#07111f;
  color:white;
}

header{
  background:
  linear-gradient(
    135deg,
    #1455ff,
    #7c2cff
  );

  padding:18px;
  text-align:center;
  position:sticky;
  top:0;
  z-index:10;
}

.container{
  max-width:1400px;
  margin:auto;
  padding:16px;
}

.card{
  background:#152238;
  border:1px solid #263852;
  padding:18px;
  border-radius:16px;
  margin:14px 0;
}

.grid{
  display:grid;

  grid-template-columns:
  repeat(
    auto-fit,
    minmax(300px,1fr)
  );

  gap:14px;
}

input,
button,
select{
  width:100%;
  padding:12px;
  margin:7px 0;
  border:none;
  border-radius:10px;
}

input,
select{
  background:#263852;
  color:white;
}

button{
  background:#22c55e;
  color:#052e16;
  font-weight:bold;
  cursor:pointer;
}

.secondary{
  background:#3b82f6;
  color:white;
}

.warning{
  background:#f59e0b;
  color:#111827;
}

.danger{
  background:#ef4444;
  color:white;
}

.hidden{
  display:none!important;
}

.nav{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:10px 0;
}

.nav button{
  white-space:nowrap;
  background:#1e293b;
  color:white;
}

#message{
  white-space:pre-wrap;
  background:#020617;
  padding:12px;
  border-radius:12px;
  min-height:55px;
}

.match{
  background:#0f172a;
  padding:12px;
  border-radius:12px;
  margin:8px 0;
}

.table-wrap{
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,
td{
  border:1px solid #334155;
  padding:10px;
  text-align:center;
}

th{
  background:#0b4ecb;
}

.qualifie{
  background:#064e3b;
}

.troisieme{
  background:#78350f;
}

.bracket{
  display:grid;

  grid-template-columns:
  repeat(
    auto-fit,
    minmax(260px,1fr)
  );

  gap:12px;
}

.proof{
  width:100%;
  border-radius:12px;
  margin-top:10px;
}

.small{
  font-size:13px;
  color:#cbd5e1;
}

</style>

</head>

<body>

<header>

<h1>SNUGAME</h1>

<p>
Tournoi eFootball Mobile
</p>

</header>

<div class="container">

<section id="pageAuth">

<div class="card">

<h2>Connexion</h2>

<input
id="loginEmail"
placeholder="Adresse email">

<input
id="loginPassword"
type="password"
placeholder="Mot de passe">

<button onclick="login()">
Connexion
</button>

<button
class="secondary"
onclick="showRegister()">

Créer un compte

</button>

</div>

<div
class="card hidden"
id="registerBox">

<h2>Créer compte</h2>

<input
id="registerName"
placeholder="Nom">

<input
id="registerEmail"
placeholder="Adresse email">

<input
id="registerPassword"
type="password"
placeholder="Mot de passe">

<button onclick="register()">
Créer compte
</button>

</div>

</section>

<section
id="pageAbonnement"
class="hidden">

<div class="card">

<h2>Abonnement</h2>

<p>
5000 FCFA / mois
</p>

<button onclick="abonnement()">
Payer abonnement
</button>

<button
class="danger"
onclick="logout()">
Déconnexion
</button>

</div>

</section>

<section
id="pageDashboard"
class="hidden">

<div class="nav">

<button
onclick="showPanel('panelTournoi')">

Tournoi

</button>

<button
onclick="showPanel('panelParticipants')">

Participants

</button>

<button
onclick="showPanel('panelPoulePro')">

Poule Pro

</button>

<button
onclick="showPanel('panelClassement')">

Classements

</button>

<button
onclick="showPanel('panelFinale')">

Phase finale

</button>

<button
onclick="showPanel('panelParametres')">

Paramètres

</button>

<button
class="danger"
onclick="logout()">

Déconnexion

</button>

</div>

<div
id="panelTournoi"
class="panel">

<div class="grid">

<div class="card">

<h2>Créer tournoi</h2>

<input
id="tournoiNom"
placeholder="Nom du tournoi">

<input
id="tournoiMax"
type="number"
value="48"
placeholder="Nombre équipes">

<button onclick="creerTournoi()">

Créer tournoi

</button>

<button
class="secondary"
onclick="chargerTournois()">

Afficher tournois

</button>

<select
id="tournoiSelect"
onchange="loadAll()">
</select>

</div>

<div class="card">

<h2>Gestion tournoi</h2>

<button
class="danger"
onclick="supprimerTournoiComplet()">

Supprimer tournoi complètement

</button>

<button
class="warning"
onclick="resetTournoi()">

Réinitialiser tournoi

</button>

<button
class="secondary"
onclick="creerLienPublic()">

Créer lien public

</button>

<input
id="lienPublic"
readonly
placeholder="Lien public résultats">

<div id="tournois"></div>

</div>

</div>

</div>

<div
id="panelParticipants"
class="panel hidden">

<div class="grid">

<div class="card">

<h2>Ajouter participant</h2>

<input
id="prenom"
placeholder="Prénom">

<input
id="participantEmail"
placeholder="Email">

<input
id="username"
placeholder="Nom utilisateur">

<input
id="telephone"
placeholder="Téléphone">

<input
id="numeroSerie"
placeholder="Numéro série">

<input
id="clubLogo"
placeholder="Club">

<input
id="preuve"
placeholder="Lien preuve">

<button onclick="ajouterParticipant()">

Ajouter participant

</button>

</div>

<div class="card">

<h2>Participants</h2>

<div id="participantsCount"></div>

<button
class="secondary"
onclick="chargerParticipants()">

Afficher participants

</button>

<button
class="secondary"
onclick="cocherTous(true)">

Tout cocher

</button>

<button
class="secondary"
onclick="cocherTous(false)">

Tout décocher

</button>

<button
class="danger"
onclick="supprimerParticipantsCoches()">

Supprimer sélectionnés

</button>

<div id="participantsCheckbox"></div>

<div id="participants"></div>

</div>

</div>

</div>

<div
id="panelPoulePro"
class="panel hidden">

<div class="card">

<h2>Poule Pro</h2>

<p class="small">

Le bouton unique génère :

Poules → 16es → 8es →
Quarts → Demis →
Finale → Champion

</p>

<button
class="warning"
onclick="tirageAutomatiquePoulePro()">

Tirage automatique poule pro

</button>

<button
class="secondary"
onclick="afficherTiragePoulePro()">

Afficher matchs

</button>

<div id="pouleProResult"></div>

</div>

</div>

<div
id="panelClassement"
class="panel hidden">

<div class="card">

<h2>Classements</h2>

<button
class="secondary"
onclick="afficherClassements()">

Afficher classements

</button>

<div id="classementsResult"></div>

</div>

</div>

<div
id="panelFinale"
class="panel hidden">

<div class="card">

<h2>Phase finale</h2>

<button
class="secondary"
onclick="afficherPhaseFinale()">

Afficher phase finale

</button>

<button
class="secondary"
onclick="voirChampion()">

Voir champion

</button>

<div id="phaseFinaleResult"></div>

</div>

</div>

<div
id="panelParametres"
class="panel hidden">

<div class="card">

<h2>Paramètres</h2>

<button
class="secondary"
onclick="nettoyerAffichage()">

Nettoyer affichage

</button>

<button
class="secondary"
onclick="checkStatus()">

Recharger page

</button>

</div>

</div>

</section>

<div class="card">

<h2>Message</h2>

<div id="message"></div>

</div>

</div>


<script>

async function post(url,data){
  const res = await fetch(url,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });
  const text = await res.text();
  message.textContent = text;
  return text;
}

async function get(url){
  const res = await fetch(url);
  const text = await res.text();
  try{
    return JSON.parse(text);
  }catch{
    message.textContent = text;
    return null;
  }
}

function showRegister(){
  registerBox.classList.toggle("hidden");
}

function setPage(page){
  pageAuth.classList.add("hidden");
  pageAbonnement.classList.add("hidden");
  pageDashboard.classList.add("hidden");
  document.getElementById(page).classList.remove("hidden");
}

function showPanel(id){
  document.querySelectorAll(".panel").forEach(p=>p.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

async function register(){
  const result = await post("/register",{
    name:registerName.value,
    email:registerEmail.value,
    password:registerPassword.value
  });

  if(result.includes("Compte")){
    await checkStatus();
  }
}

async function login(){
  const result = await post("/login",{
    email:loginEmail.value,
    password:loginPassword.value
  });

  if(result.includes("Connexion")){
    setPage("pageDashboard");
    await chargerTournois();
  }
}

async function logout(){
  await post("/logout",{});
  setPage("pageAuth");
}

async function abonnement(){
  const result = await post("/abonnement",{});

  if(result.includes("Abonnement")){
    setPage("pageDashboard");
    await chargerTournois();
  }
}

async function checkStatus(){
  const data = await get("/me");

  if(!data || data.connected === false){
    setPage("pageAuth");
    return;
  }

  if(data.abonnement !== 1){
    setPage("pageAbonnement");
    return;
  }

  setPage("pageDashboard");
  await chargerTournois();
}

async function creerTournoi(){
  if(!tournoiNom.value){
    message.textContent = "Nom tournoi obligatoire";
    return;
  }

  await post("/tournoi",{
    name:tournoiNom.value,
    max_teams:48
  });

  await chargerTournois();
}

async function chargerTournois(){
  const data = await get("/tournois");

  if(!Array.isArray(data)) return;

  tournoiSelect.innerHTML = data.map(t=>`
    <option value="${t.id}">${t.name}</option>
  `).join("");

  tournois.innerHTML = data.map(t=>`
    <div class="match">
      <b>${t.name}</b><br>
      ID : ${t.id}<br>
      Équipes : ${t.max_teams}<br>
      Statut : ${t.status}
    </div>
  `).join("");

  await loadAll();
}

async function ajouterParticipant(){
  if(!tournoiSelect.value){
    message.textContent = "Choisis tournoi";
    return;
  }

  await post("/participant",{
    tournament_id:tournoiSelect.value,
    prenom:prenom.value,
    email:participantEmail.value,
    username:username.value,
    telephone:telephone.value,
    numero_serie:numeroSerie.value,
    club_logo:clubLogo.value,
    preuve:preuve.value
  });

  await chargerParticipants();
}

async function chargerParticipants(){
  if(!tournoiSelect.value) return;

  const data = await get("/participants/" + tournoiSelect.value);

  if(!Array.isArray(data)) return;

  participantsCount.innerHTML = `<h3>${data.length}/48 équipes</h3>`;

  participantsCheckbox.innerHTML = data.map(p=>`
    <label>
      <input type="checkbox" class="participantCheck" value="${p.id}">
      ${p.prenom}
    </label><br>
  `).join("");

  participants.innerHTML = data.map(p=>`
    <div class="match">
      <b>${p.prenom}</b><br>
      ${p.club_logo || ""}<br>
      Groupe : ${p.group_name || "Aucun"}
    </div>
  `).join("");
}

function cocherTous(etat){
  document.querySelectorAll(".participantCheck").forEach(c=>c.checked=etat);
}

async function supprimerParticipantsCoches(){
  const ids = Array.from(
    document.querySelectorAll(".participantCheck:checked")
  ).map(i=>i.value);

  if(!ids.length){
    message.textContent = "Aucun participant sélectionné";
    return;
  }

  if(!confirm("Supprimer participants ?")) return;

  await post("/supprimer-participants-selection",{ids});
  await chargerParticipants();
}

async function supprimerTournoiComplet(){
  if(!tournoiSelect.value){
    message.textContent = "Choisis tournoi";
    return;
  }

  if(!confirm("Supprimer complètement le tournoi ?")) return;

  await post("/supprimer-tournoi-complet",{
    tournament_id:tournoiSelect.value
  });

  nettoyerAffichage();
  await chargerTournois();
}

async function resetTournoi(){
  if(!tournoiSelect.value){
    message.textContent = "Choisis tournoi";
    return;
  }

  if(!confirm("Réinitialiser le tournoi ?")) return;

  await post("/reset-tournoi",{
    tournament_id:tournoiSelect.value
  });

  nettoyerAffichage();
  await chargerParticipants();
}

async function tirageAutomatiquePoulePro(){
  if(!tournoiSelect.value){
    message.textContent = "Choisis tournoi";
    return;
  }

  await post("/tirage-automatique-poule-pro",{
    tournament_id:tournoiSelect.value
  });

  await afficherTiragePoulePro();
  await afficherClassements();
  await afficherPhaseFinale();
}

function matchCard(match){
  return `
    <div class="match">
      <b>${match.player1_name || "Équipe 1"}</b>
      VS
      <b>${match.player2_name || "Équipe 2"}</b>

      <input type="number" id="score1_${match.id}" value="${match.score1 ?? ""}" placeholder="Score 1">
      <input type="number" id="score2_${match.id}" value="${match.score2 ?? ""}" placeholder="Score 2">

      <input type="hidden" id="photo_${match.id}" value="${match.proof_photo || ""}">
      <input type="file" accept="image/*" id="file_${match.id}">

      <button class="secondary" onclick="validerScore(${match.id})">
        Valider score
      </button>

      <button class="danger" onclick="annulerScore(${match.id})">
        Annuler score
      </button>

      <p>${match.played ? match.score1 + " - " + match.score2 : "Non joué"}</p>

      ${match.locked === 1 ? "<p>🔒 Score verrouillé</p>" : ""}

      <div id="preview_${match.id}">
        ${
          match.proof_photo
          ? `<img class="proof" src="${match.proof_photo}">`
          : ""
        }
      </div>
    </div>
  `;
}

async function afficherTiragePoulePro(){
  if(!tournoiSelect.value) return;

  const data = await get("/tirage/" + tournoiSelect.value);

  if(!Array.isArray(data)) return;

  pouleProResult.innerHTML = data.map(bloc=>`
    <div class="card">
      <h3>${bloc.tour}</h3>
      ${bloc.matchs.map(matchCard).join("")}
    </div>
  `).join("");
}

async function validerScore(matchId){
  let photo = document.getElementById("photo_" + matchId).value;
  const fileInput = document.getElementById("file_" + matchId);

  if(fileInput && fileInput.files.length){
    const formData = new FormData();
    formData.append("image", fileInput.files[0]);

    const uploadRes = await fetch("/upload-image",{
      method:"POST",
      body:formData
    });

    const uploadData = await uploadRes.json();

    if(!uploadData.ok){
      message.textContent = uploadData.message || "Erreur upload image";
      return;
    }

    photo = uploadData.url;

    document.getElementById("photo_" + matchId).value = photo;
    document.getElementById("preview_" + matchId).innerHTML =
      `<img class="proof" src="${photo}">`;
  }

  await post("/update-match-proof",{
    match_id:matchId,
    score1:document.getElementById("score1_" + matchId).value,
    score2:document.getElementById("score2_" + matchId).value,
    photo_url:photo
  });

  setTimeout(async ()=>{
    await afficherTiragePoulePro();
    await afficherClassements();
    await afficherPhaseFinale();
  },500);
}

async function annulerScore(matchId){
  if(!confirm("Annuler ce score ?")) return;

  await post("/annuler-score",{
    match_id:matchId
  });

  await afficherTiragePoulePro();
  await afficherClassements();
  await afficherPhaseFinale();
}

async function uploadPreuve(matchId){
  const fileInput = document.getElementById("file_" + matchId);

  if(!fileInput.files.length){
    message.textContent = "Choisis une image";
    return;
  }

  const formData = new FormData();
  formData.append("image", fileInput.files[0]);

  const res = await fetch("/upload-image",{
    method:"POST",
    body:formData
  });

  const data = await res.json();

  if(!data.ok){
    message.textContent = data.message || "Erreur upload";
    return;
  }

  document.getElementById("photo_" + matchId).value = data.url;
  document.getElementById("preview_" + matchId).innerHTML =
    `<img class="proof" src="${data.url}">`;

  message.textContent = "Image uploadée";
}

async function afficherClassements(){
  if(!tournoiSelect.value) return;

  const data = await get("/classement-poules/" + tournoiSelect.value);

  if(!data) return;

  classementsResult.innerHTML = Object.keys(data).map(groupe=>`
    <div class="card">
      <h3>Groupe ${groupe}</h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Équipe</th>
              <th>MJ</th>
              <th>V</th>
              <th>N</th>
              <th>D</th>
              <th>BP</th>
              <th>BC</th>
              <th>Diff</th>
              <th>Pts</th>
            </tr>
          </thead>
          <tbody>
            ${data[groupe].map((e,i)=>`
              <tr class="${i<2 ? "qualifie" : ""} ${i===2 ? "troisieme" : ""}">
                <td>${i+1}</td>
                <td>${e.prenom}</td>
                <td>${e.j}</td>
                <td>${e.v}</td>
                <td>${e.n}</td>
                <td>${e.d}</td>
                <td>${e.bp}</td>
                <td>${e.bc}</td>
                <td>${e.diff}</td>
                <td>${e.pts}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    </div>
  `).join("");
}

async function afficherPhaseFinale(){
  if(!tournoiSelect.value) return;

  const data = await get("/tirage/" + tournoiSelect.value);

  if(!Array.isArray(data)) return;

  const finale = data.filter(b=>!b.tour.startsWith("Groupe"));

  phaseFinaleResult.innerHTML = `
    <div class="bracket">
      ${finale.map(bloc=>`
        <div class="card">
          <h3>${bloc.tour}</h3>
          ${bloc.matchs.map(matchCard).join("")}
        </div>
      `).join("")}
    </div>
  `;
}

async function voirChampion(){
  if(!tournoiSelect.value) return;

  const champion = await get("/champion/" + tournoiSelect.value);

  if(!champion){
    message.textContent = "Aucun champion";
    return;
  }

  phaseFinaleResult.innerHTML = `
    <div class="card">
      <h1>🏆 Champion</h1>
      <h2>${champion.prenom}</h2>
      <p>${champion.club_logo || ""}</p>
    </div>
  `;
}

function creerLienPublic(){
  if(!tournoiSelect.value){
    message.textContent = "Choisis tournoi";
    return;
  }

  lienPublic.value =
    location.origin + "/public-tournoi/" + tournoiSelect.value;

  message.textContent = "Lien public créé. Copie-le ou partage-le.";
}

function nettoyerAffichage(){
  const ids = [
    "participants",
    "participantsCheckbox",
    "participantsCount",
    "pouleProResult",
    "classementsResult",
    "phaseFinaleResult"
  ];

  ids.forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.innerHTML = "";
  });
}

async function loadAll(){
  await chargerParticipants();
  await afficherTiragePoulePro();
  await afficherClassements();
  await afficherPhaseFinale();
}

checkStatus();

</script>

</body>
</html>
