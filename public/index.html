<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNUGAME</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#07111f;
  color:white;
}

header{
  background:linear-gradient(135deg,#1455ff,#7c2cff);
  padding:18px;
  text-align:center;
  position:sticky;
  top:0;
  z-index:10;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:16px;
}

.card{
  background:#152238;
  border:1px solid #263852;
  padding:18px;
  border-radius:16px;
  margin:14px 0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:14px;
}

input,
button,
select{
  width:100%;
  padding:12px;
  margin:7px 0;
  border:none;
  border-radius:10px;
}

input,
select{
  background:#263852;
  color:white;
}

button{
  background:#22c55e;
  color:#052e16;
  font-weight:bold;
  cursor:pointer;
}

.secondary{
  background:#3b82f6;
  color:white;
}

.warning{
  background:#f59e0b;
  color:#111827;
}

.danger{
  background:#ef4444;
  color:white;
}

.hidden{
  display:none!important;
}

.nav{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:10px 0;
}

.nav button{
  white-space:nowrap;
  background:#1e293b;
  color:white;
}

#message{
  white-space:pre-wrap;
  background:#020617;
  padding:12px;
  border-radius:12px;
  min-height:55px;
}

.match{
  background:#0f172a;
  padding:12px;
  border-radius:12px;
  margin:8px 0;
}

</style>
</head>

<body>

<header>

<h1>SNUGAME</h1>

<p>
Tournoi eFootball Mobile
</p>

</header>

<div class="container">

<section id="pageAuth">

<div class="card">

<h2>Connexion</h2>

<input
id="loginEmail"
placeholder="Adresse email">

<input
id="loginPassword"
type="password"
placeholder="Mot de passe">

<button onclick="login()">
Connexion
</button>

<button
class="secondary"
onclick="showRegister()">

Créer un compte

</button>

<button
class="warning"
onclick="showForgot()">

Mot de passe oublié

</button>

</div>

<div
class="card hidden"
id="registerBox">

<h2>Créer compte</h2>

<input
id="registerName"
placeholder="Nom">

<input
id="registerEmail"
placeholder="Adresse email">

<input
id="registerPassword"
type="password"
placeholder="Mot de passe">

<button onclick="register()">
Créer compte
</button>

</div>

<div
class="card hidden"
id="forgotBox">

<h2>Mot de passe oublié</h2>

<input
id="forgotEmail"
placeholder="Email du compte">

<button onclick="forgotPassword()">
Envoyer code
</button>

<input
id="resetCode"
placeholder="Code 6 chiffres">

<input
id="newPassword"
type="password"
placeholder="Nouveau mot de passe">

<button onclick="resetPassword()">
Changer mot de passe
</button>

</div>

</section>

<section
id="pageAbonnement"
class="hidden">

<div class="card">

<h2>Abonnement</h2>

<p>
5000 FCFA / mois
</p>

<button onclick="abonnement()">
Payer abonnement
</button>

<button
class="danger"
onclick="logout()">
Déconnexion
</button>

</div>

</section>

<section
id="pageDashboard"
class="hidden">

<div class="nav">

<button onclick="showPanel('panelTournoi')">
Tournoi
</button>

<button onclick="showPanel('panelParticipants')">
Participants
</button>

<button onclick="showPanel('panelParametres')">
Paramètres
</button>

<button
class="danger"
onclick="logout()">
Déconnexion
</button>

</div>

<div id="panelTournoi" class="panel">

<div class="grid">

<div class="card">

<h2>Créer tournoi</h2>

<input
id="tournoiNom"
placeholder="Nom du tournoi">

<input
id="tournoiMax"
type="number"
placeholder="Nombre équipes">

<button onclick="creerTournoi()">
Créer tournoi
</button>

<button
class="secondary"
onclick="chargerTournois()">
Afficher mes tournois
</button>

<select
id="tournoiSelect"
onchange="loadAll()">
</select>

</div>

<div class="card">

<h2>Mes tournois</h2>

<button
class="danger"
onclick="supprimerTournoiComplet()">
Supprimer tournoi complètement
</button>

<div id="tournois"></div>

</div>

</div>

</div>

<div
id="panelParticipants"
class="panel hidden">

<div class="grid">

<div class="card">

<h2>Ajouter participant</h2>

<input
id="prenom"
placeholder="Prénom joueur">

<input
id="participantEmail"
placeholder="Email participant">

<input
id="username"
placeholder="Nom utilisateur eFootball">

<input
id="telephone"
placeholder="Téléphone">

<input
id="numeroSerie"
placeholder="Numéro série">

<input
id="clubLogo"
placeholder="Club / logo">

<input
id="preuve"
placeholder="Lien preuve">

<button onclick="ajouterParticipant()">
Ajouter participant
</button>

</div>

<div class="card">

<h2>Participants</h2>

<button
class="secondary"
onclick="chargerParticipants()">
Afficher participants
</button>

<button
class="danger"
onclick="supprimerParticipantsCoches()">
Supprimer sélectionnés
</button>

<div id="participantsCheckbox"></div>

<div id="participants"></div>

</div>

</div>

</div>

<div
id="panelParametres"
class="panel hidden">

<div class="card">

<h2>Paramètres anti-bug</h2>

<button
class="secondary"
onclick="nettoyerAffichage()">
Nettoyer affichage
</button>

<button
class="secondary"
onclick="verifierTournoi()">
Vérifier tournoi
</button>

<button
class="secondary"
onclick="chargerTournois()">
Recharger tournois
</button>

<button
class="secondary"
onclick="checkStatus()">
Réinitialiser page
</button>

</div>

</div>

</section>

<div class="card">

<h2>Message</h2>

<div id="message"></div>

</div>

</div>

<script>

async function post(url,data){

  const res = await fetch(url,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify(data)
  });

  const text = await res.text();

  document
  .getElementById("message")
  .textContent = text;

  return text;

}

async function get(url){

  const res = await fetch(url);

  const text = await res.text();

  try{
    return JSON.parse(text);
  }

  catch{

    document
    .getElementById("message")
    .textContent = text;

    return null;

  }

}

function showRegister(){

  document
  .getElementById("registerBox")
  .classList.toggle("hidden");

}

function showForgot(){

  document
  .getElementById("forgotBox")
  .classList.toggle("hidden");

}

function setPage(page){

  document
  .getElementById("pageAuth")
  .classList.add("hidden");

  document
  .getElementById("pageAbonnement")
  .classList.add("hidden");

  document
  .getElementById("pageDashboard")
  .classList.add("hidden");

  document
  .getElementById(page)
  .classList.remove("hidden");

}

function showPanel(id){

  document
  .querySelectorAll(".panel")
  .forEach(p => p.classList.add("hidden"));

  document
  .getElementById(id)
  .classList.remove("hidden");

}

async function register(){
  const result = await post("/register",{
    name:registerName.value,
    email:registerEmail.value,
    password:registerPassword.value
  });

  if(result.includes("Compte")){
    await checkStatus();
  }
}

async function login(){
  const result = await post("/login",{
    email:loginEmail.value,
    password:loginPassword.value
  });

  if(result.includes("Connexion")){
    setPage("pageDashboard");
    await chargerTournois();
  }
}

async function logout(){
  await post("/logout",{});
  setPage("pageAuth");
}

async function abonnement(){
  const result = await post("/abonnement",{});

  if(result.includes("Abonnement")){
    setPage("pageDashboard");
    await chargerTournois();
  }
}

checkStatus();

</script>

</body>
</html>
