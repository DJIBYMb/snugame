<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNUGAME - Tournoi eFootball</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#07111f;
  color:white;
}

header{
  background:linear-gradient(135deg,#1455ff,#7c2cff);
  padding:18px;
  text-align:center;
  position:sticky;
  top:0;
  z-index:10;
}

header h1{
  margin:0;
  font-size:26px;
}

header p{
  margin:5px 0 0;
  color:#dbeafe;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:16px;
}

.card{
  background:#152238;
  border:1px solid #263852;
  padding:18px;
  border-radius:16px;
  margin:14px 0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:14px;
}

input,select,button,textarea{
  width:100%;
  padding:12px;
  margin:7px 0;
  border:none;
  border-radius:10px;
}

input,select,textarea{
  background:#263852;
  color:white;
}

button{
  background:#22c55e;
  color:#052e16;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:.9;
}

.secondary{
  background:#3b82f6;
  color:white;
}

.warning{
  background:#f59e0b;
  color:#111827;
}

.danger{
  background:#ef4444;
  color:white;
}

.hidden{
  display:none!important;
}

.nav{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:10px 0;
}

.nav button{
  white-space:nowrap;
  background:#1e293b;
  color:white;
}

.badge{
  display:inline-block;
  background:#1d4ed8;
  color:white;
  padding:5px 10px;
  border-radius:20px;
  margin:3px;
  font-size:13px;
}

.private{
  background:#3b1d1d;
  border:1px dashed #f87171;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
}

.match{
  background:#0f172a;
  border-radius:12px;
  padding:12px;
  margin:8px 0;
}

.proof{
  max-width:100%;
  border-radius:12px;
  margin-top:10px;
  border:2px solid #334155;
}

.step{
  color:#93c5fd;
  font-size:14px;
}

#message{
  white-space:pre-wrap;
  background:#020617;
  padding:12px;
  border-radius:12px;
  min-height:55px;
}
</style>
</head>

<body>

<header>
<h1>SNUGAME</h1>
<p>Tournoi eFootball Mobile</p>
</header>

<div class="container">

<section id="pageAuth">

  <div class="card">
    <div class="step">Étape 1</div>
    <h2>Connexion</h2>

    <input id="loginEmail" placeholder="Adresse email">
    <input id="loginPassword" type="password" placeholder="Mot de passe">

    <button onclick="login()">Connexion</button>
    <button class="secondary" onclick="showRegister()">Créer un compte</button>
    <button class="warning" onclick="showForgot()">Mot de passe oublié</button>
  </div>

  <div class="card hidden" id="registerBox">
    <h2>Créer compte</h2>

    <input id="registerName" placeholder="Nom">
    <input id="registerEmail" placeholder="Adresse email">
    <input id="registerPassword" type="password" placeholder="Mot de passe">

    <button onclick="register()">Créer compte</button>
  </div>

  <div class="card hidden" id="forgotBox">
    <h2>Mot de passe oublié</h2>

    <input id="forgotEmail" placeholder="Email du compte">
    <button onclick="forgotPassword()">Envoyer code</button>

    <input id="resetCode" placeholder="Code 6 chiffres">
    <input id="newPassword" type="password" placeholder="Nouveau mot de passe">

    <button onclick="resetPassword()">Changer mot de passe</button>
  </div>

</section>

<section id="pageAbonnement" class="hidden">

  <div class="card">
    <div class="step">Étape 2</div>

    <h2>Abonnement</h2>

    <h1>5000 FCFA / mois</h1>

    <p>
      Après paiement, tu peux organiser tes tournois.
    </p>

    <button onclick="abonnement()">
      Payer abonnement
    </button>

    <button class="secondary" onclick="checkStatus()">
      Actualiser
    </button>

    <button class="danger" onclick="logout()">
      Déconnexion
    </button>

  </div>

</section>

<section id="pageDashboard" class="hidden">

  <div class="nav">
    <button onclick="showPanel('panelTournoi')">Tournoi</button>
    <button onclick="showPanel('panelParticipants')">Participants</button>
    <button onclick="showPanel('panelPoules')">Poules</button>
    <button onclick="showPanel('panelScores')">Scores</button>
    <button onclick="showPanel('panelFinale')">Phase finale</button>
    <button onclick="showPanel('panelAdmin')">Admin</button>
    <button class="danger" onclick="logout()">Déconnexion</button>
  </div>

  <div id="panelTournoi" class="panel">

    <div class="card">
      <div class="step">Étape 3</div>

      <h2>Créer tournoi</h2>

      <input id="tournoiNom" placeholder="Nom du tournoi">

      <button onclick="creerTournoi()">
        Créer tournoi
      </button>

      <button class="secondary" onclick="chargerTournois()">
        Afficher tournois
      </button>

      <select id="tournoiSelect"></select>

      <div id="tournois"></div>
    </div>

  </div>

</section>

<div class="card">
<h2>Message</h2>
<div id="message"></div>
</div>

</div>

<script>

async function post(url,data){

  const res = await fetch(url,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify(data)
  });

  const text = await res.text();

  message.textContent = text;

  return text;
}

async function get(url){

  const res = await fetch(url);

  return await res.json();
}

function showRegister(){
  registerBox.classList.toggle("hidden");
}

function showForgot(){
  forgotBox.classList.toggle("hidden");
}

function setPage(page){

  pageAuth.classList.add("hidden");
  pageAbonnement.classList.add("hidden");
  pageDashboard.classList.add("hidden");

  document.getElementById(page)
    .classList.remove("hidden");
}

async function checkStatus(){

  const data = await get("/api/status");

  if(!data.connected){
    setPage("pageAuth");
    return;
  }

  if(!data.user.abonnement){
    setPage("pageAbonnement");
    return;
  }

  setPage("pageDashboard");

  await chargerTournois();
}

async function register(){

  const result = await post("/register",{
    name:registerName.value,
    email:registerEmail.value,
    password:registerPassword.value
  });

  if(result.includes("Compte")){
    setPage("pageAbonnement");
  }
}

async function login(){

  const result = await post("/login",{
    email:loginEmail.value,
    password:loginPassword.value
  });

  if(result.includes("Connexion")){
    await checkStatus();
  }
}

async function logout(){

  await post("/logout",{});

  setPage("pageAuth");
}

async function forgotPassword(){

  await post("/forgot-password",{
    email:forgotEmail.value
  });
}

async function resetPassword(){

  await post("/reset-password",{
    email:forgotEmail.value,
    code:resetCode.value,
    newPassword:newPassword.value
  });
}

async function abonnement(){

  const result =
    await post("/abonnement",{});

  if(result.includes("Abonnement")){

    setPage("pageDashboard");

    await chargerTournois();
  }
}

async function creerTournoi(){

  await post("/tournoi",{
    name:tournoiNom.value
  });

  await chargerTournois();
}

async function chargerTournois(){

  const data = await get("/tournois");

  if(!Array.isArray(data)) return;

  tournoiSelect.innerHTML =
    data.map(t => `
      <option value="${t.id}">
        ${t.name}
      </option>
    `).join("");

  tournois.innerHTML =
    data.map(t => `
      <div class="card">

        <h3>${t.name}</h3>

        <p>ID : ${t.id}</p>

      </div>
    `).join("");
}

checkStatus();

</script>

</body>
</html>
