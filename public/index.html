<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>SNUGAME</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#07111f;
  color:white;
}

header{
  background:linear-gradient(135deg,#1455ff,#7c2cff);
  padding:18px;
  text-align:center;
  position:sticky;
  top:0;
  z-index:10;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:16px;
}

.card{
  background:#152238;
  border:1px solid #263852;
  padding:18px;
  border-radius:16px;
  margin:14px 0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:14px;
}

input,
button,
select{
  width:100%;
  padding:12px;
  margin:7px 0;
  border:none;
  border-radius:10px;
}

input,
select{
  background:#263852;
  color:white;
}

button{
  background:#22c55e;
  color:#052e16;
  font-weight:bold;
  cursor:pointer;
}

.secondary{
  background:#3b82f6;
  color:white;
}

.warning{
  background:#f59e0b;
  color:#111827;
}

.danger{
  background:#ef4444;
  color:white;
}

.hidden{
  display:none!important;
}

.nav{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:10px 0;
}

.nav button{
  white-space:nowrap;
  background:#1e293b;
  color:white;
}

#message{
  white-space:pre-wrap;
  background:#020617;
  padding:12px;
  border-radius:12px;
  min-height:55px;
}

.match{
  background:#0f172a;
  padding:12px;
  border-radius:12px;
  margin:8px 0;
}

.proof{
  max-width:100%;
  border-radius:12px;
  margin-top:10px;
}

</style>

</head>

<body>

<header>

<h1>SNUGAME</h1>

<p>
Tournoi eFootball Mobile
</p>

</header>

<div class="container">

<section id="pageAuth">

<div class="card">

<h2>Connexion</h2>

<input
id="loginEmail"
placeholder="Adresse email">

<input
id="loginPassword"
type="password"
placeholder="Mot de passe">

<button onclick="login()">
Connexion
</button>

<button
class="secondary"
onclick="showRegister()">

Créer un compte

</button>

<button
class="warning"
onclick="showForgot()">

Mot de passe oublié

</button>

</div>

<div
class="card hidden"
id="registerBox">

<h2>Créer compte</h2>

<input
id="registerName"
placeholder="Nom">

<input
id="registerEmail"
placeholder="Adresse email">

<input
id="registerPassword"
type="password"
placeholder="Mot de passe">

<button onclick="register()">

Créer compte

</button>

</div>

<div
class="card hidden"
id="forgotBox">

<h2>Mot de passe oublié</h2>

<input
id="forgotEmail"
placeholder="Email du compte">

<button onclick="forgotPassword()">

Envoyer code

</button>

<input
id="resetCode"
placeholder="Code 6 chiffres">

<input
id="newPassword"
type="password"
placeholder="Nouveau mot de passe">

<button onclick="resetPassword()">

Changer mot de passe

</button>

</div>

</section>

<section
id="pageAbonnement"
class="hidden">

<div class="card">

<h2>Abonnement</h2>

<p>
5000 FCFA / mois
</p>

<button onclick="abonnement()">

Payer abonnement

</button>

<button
class="danger"
onclick="logout()">

Déconnexion

</button>

</div>

</section>

<section
id="pageDashboard"
class="hidden">

<div class="nav">

<button onclick="showPanel('panelTournoi')">
Tournoi
</button>

<button onclick="showPanel('panelParticipants')">
Participants
</button>

<button onclick="showPanel('panelPoules')">
Poules
</button>
<div id="panelPoules" class="panel hidden">
  <div class="card">
    <h2>Poules 48 équipes</h2>

    <button id="btnGenererPoules" onclick="genererPoules()">
      Tirage automatique 48 équipes
    </button>

    <button class="secondary" onclick="tirage()">
      Voir groupes / matchs
    </button>

    <button class="secondary" onclick="classementPoules()">
      Classement poules
    </button>
    <button class="warning" onclick="generer16es()">
  Générer 16es automatiquement
</button>

<button class="warning" onclick="genererTour('16ES','8ES')">
  Générer 8es automatiquement
</button>

<button class="warning" onclick="genererTour('8ES','QUART')">
  Générer quarts automatiquement
</button>

<button class="warning" onclick="genererTour('QUART','DEMI')">
  Générer demis automatiquement
</button>

<button class="warning" onclick="genererTour('DEMI','FINALE')">
  Générer finale automatiquement
</button>

    <div id="tirageResult"></div>
  </div>
</div>
<button onclick="showPanel('panelScores')">
Scores
</button>

<button onclick="showPanel('panelClassement')">
Classement
</button>

<button
class="danger"
onclick="logout()">

Déconnexion

</button>

</div>

<div id="panelTournoi" class="panel">

<div class="grid">

<div class="card">

<h2>Créer tournoi</h2>

<input
id="tournoiNom"
placeholder="Nom du tournoi">

<input
id="tournoiMax"
type="number"
placeholder="Nombre équipes">

<button onclick="creerTournoi()">

Créer tournoi

</button>

<button
class="secondary"
onclick="chargerTournois()">

Afficher mes tournois

</button>

<select
id="tournoiSelect"
onchange="loadAll()">

</select>

</div>

<div class="card">

<h2>Mes tournois</h2>

<div id="tournois"></div>

</div>

</div>

</div>

<div
id="panelParticipants"
class="panel hidden">

<div class="grid">

<div class="card">

<h2>Ajouter participant</h2>

<input id="prenom" placeholder="Prénom joueur">

<input
id="participantEmail"
placeholder="Email participant">

<input
id="username"
placeholder="Nom utilisateur eFootball">

<input
id="telephone"
placeholder="Téléphone">

<input
id="numeroSerie"
placeholder="Numéro série">

<input
id="clubLogo"
placeholder="Club / logo">

<input
id="preuve"
placeholder="Lien preuve">

<button onclick="ajouterParticipant()">

Ajouter participant

</button>

</div>

<div class="card">

<h2>Participants</h2>

<button
class="secondary"
onclick="chargerParticipants()">

Afficher participants

</button>

<div id="participants"></div>

</div>

</div>

</div>

<div
id="panelPoules"
class="panel hidden">

<div class="card">

<h2>Poules 48 équipes</h2>

<button onclick="genererPoules()">

Générer groupes

</button>

<button
class="secondary"
onclick="tirage()">

Voir tirage

</button>

<div id="tirageResult"></div>

</div>

</div>

<div
id="panelScores"
class="panel hidden">

<div class="card">

<h2>Résultat match</h2>

<input
id="matchId"
placeholder="ID match">

<input
id="score1"
type="number"
placeholder="Score équipe 1">

<input
id="score2"
type="number"
placeholder="Score équipe 2">

<input
id="photoResultat"
placeholder="Lien photo résultat">

<button onclick="envoyerResultatMatch()">

Envoyer résultat

</button>

</div>

</div>

<div
id="panelClassement"
class="panel hidden">

<div class="card">

<h2>Classement</h2>

<button onclick="classement()">

Voir classement

</button>

<div id="classementResult"></div>

</div>

</div>

<div class="card">

<h2>Message</h2>

<div id="message"></div>

</div>

</section>

</div>

<script>

async function post(url,data){

  const res = await fetch(url,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify(data)
  });

  const text = await res.text();

  document.getElementById("message")
  .textContent = text;

  return text;

}

async function get(url){

  const res = await fetch(url);

  const text = await res.text();

  try{
    return JSON.parse(text);
  }

  catch{

    document.getElementById("message")
    .textContent = text;

    return null;

  }

}

function showRegister(){

  document
  .getElementById("registerBox")
  .classList.toggle("hidden");

}

function showForgot(){

  document
  .getElementById("forgotBox")
  .classList.toggle("hidden");

}

function setPage(page){

  document
  .getElementById("pageAuth")
  .classList.add("hidden");

  document
  .getElementById("pageAbonnement")
  .classList.add("hidden");

  document
  .getElementById("pageDashboard")
  .classList.add("hidden");

  document
  .getElementById(page)
  .classList.remove("hidden");

}

function showPanel(id){

  document
  .querySelectorAll(".panel")
  .forEach(p => p.classList.add("hidden"));

  document
  .getElementById(id)
  .classList.remove("hidden");

}

async function checkStatus(){

  const data = await get("/me");

  if(!data || data.connected === false){

    setPage("pageAuth");

    return;

  }

  if(data.abonnement !== 1){

    setPage("pageAbonnement");

    return;

  }

  setPage("pageDashboard");

  await chargerTournois();

}

async function register(){

  const result = await post("/register",{

    name:
    document.getElementById("registerName").value,

    email:
    document.getElementById("registerEmail").value,

    password:
    document.getElementById("registerPassword").value

  });

  if(
    result.includes("Compte")
    ||
    result.includes("créé")
  ){

    await checkStatus();

  }

}

async function login(){

  const result = await post("/login",{

    email:
    document.getElementById("loginEmail").value,

    password:
    document.getElementById("loginPassword").value

  });

  if(
    result.includes("Connexion")
    ||
    result.includes("réussie")
  ){

    setPage("pageDashboard");

    await chargerTournois();

  }

}

async function logout(){

  await post("/logout",{});

  setPage("pageAuth");

}

async function forgotPassword(){

  await post("/forgot-password",{

    email:
    document.getElementById("forgotEmail").value

  });

}

async function resetPassword(){

  await post("/reset-password",{

    email:
    document.getElementById("forgotEmail").value,

    code:
    document.getElementById("resetCode").value,

    newPassword:
    document.getElementById("newPassword").value

  });

}

async function abonnement(){

  const result =
    await post("/abonnement",{});

  if(
    result.includes("Abonnement")
    ||
    result.includes("activé")
  ){

    setPage("pageDashboard");

    await chargerTournois();

  }

}

async function creerTournoi(){

  await post("/tournoi",{

    name:
    document.getElementById("tournoiNom").value,

    max_teams:Number(
      document.getElementById("tournoiMax").value
    )

  });

  await chargerTournois();

}

async function chargerTournois(){

  const data =
    await get("/tournois");

  if(!Array.isArray(data)) return;

  document
  .getElementById("tournoiSelect")
  .innerHTML =

    data.map(t => `
      <option value="${t.id}">
        ${t.name}
      </option>
    `).join("");

  document
  .getElementById("tournois")
  .innerHTML =

    data.map(t => `
      <div class="match">
        <h3>${t.name}</h3>
        <p>ID : ${t.id}</p>
      </div>
    `).join("");

}

async function loadAll(){

  await chargerParticipants();

  await tirage();

  await classement();

}

async function ajouterParticipant(){

  await post("/participant",{

    tournament_id:
    document.getElementById("tournoiSelect").value,

    prenom:
    document.getElementById("prenom").value,

    email:
    document.getElementById("participantEmail").value,

    username:
    document.getElementById("username").value,

    telephone:
    document.getElementById("telephone").value,

    numero_serie:
    document.getElementById("numeroSerie").value,

    club_logo:
    document.getElementById("clubLogo").value,

    preuve:
    document.getElementById("preuve").value

  });

  await chargerParticipants();

}

async function chargerParticipants(){

  const tournoiId =
    document.getElementById("tournoiSelect").value;

  if(!tournoiId) return;

  const data =
    await get("/participants/" + tournoiId);
  document.getElementById("btnGenererPoules").disabled =
  data.length !== 48;
  if(!Array.isArray(data)) return;

  document
  .getElementById("participants")
  .innerHTML =

    data.map(p => `
      <div class="match">
        <b>
          ${p.prenom || ""}
        </b>
        <br>
        ID : ${p.id}
      </div>
    `).join("");

}

async function genererPoules(){

  await post("/generer-poules",{

    tournament_id:
    document.getElementById("tournoiSelect").value

  });

  await tirage();

}

async function tirage(){

  const tournoiId =
    document.getElementById("tournoiSelect").value;

  if(!tournoiId) return;

  const data =
    await get("/tirage/" + tournoiId);

  if(!Array.isArray(data)) return;

  document
  .getElementById("tirageResult")
  .innerHTML =

    data.map(t => `

      <div class="card">

        <h3>${t.tour}</h3>

        ${t.matchs.map(m => `

          <div class="match">

            <p>
              <b>${m.player1_name || "Équipe 1"}</b>
              VS
              <b>${m.player2_name || "Équipe 2"}</b>
            </p>

            <div class="grid">

              <input
              id="score1_${m.id}"
              type="number"
              min="0"
              max="100"
              value="${m.score1 ?? 0}"
              placeholder="Score équipe 1">

              <input
              id="score2_${m.id}"
              type="number"
              min="0"
              max="100"
              value="${m.score2 ?? 0}"
              placeholder="Score équipe 2">

            </div>

            <input
            id="photo_${m.id}"
            value="${m.proof_photo || ""}"
            placeholder="Lien photo résultat">

            <button onclick="validerScore(${m.id})">
              Valider le score
            </button>

            <p>
              Résultat :
              ${m.played
                ? m.score1 + " VS " + m.score2
                : "0 VS 0"}
            </p>

            ${m.proof_photo
              ? `<img class="proof" src="${m.proof_photo}">`
              : ""}

          </div>

        `).join("")}

      </div>

    `).join("");

}
async function validerScore(matchId){

  const score1 =
    document.getElementById("score1_" + matchId).value;

  const score2 =
    document.getElementById("score2_" + matchId).value;

  const photo =
    document.getElementById("photo_" + matchId).value;

  await post("/update-match-proof",{
    match_id:matchId,
    score1:score1,
    score2:score2,
    photo_url:photo
  });

  await tirage();

}

async function classement(){

  const tournoiId =
    document.getElementById("tournoiSelect").value;

  if(!tournoiId) return;

  const data =
    await get("/classement/" + tournoiId);

  if(!data) return;

  document
  .getElementById("classementResult")
  .innerHTML = `

    <h3>Meilleurs buteurs</h3>

    ${(data.meilleursButeurs || []).map(p => `
      <p>
        ${p.prenom || ""}
        - ${p.buts} buts
      </p>
    `).join("")}

    <h3>Moins de buts encaissés</h3>

    ${(data.meilleureDefense || []).map(p => `
      <p>
        ${p.prenom || ""}
        - ${p.buts_encaisses}
      </p>
    `).join("")}

  `;

}
async function generer16es(){
  await post("/generer-16es",{
    tournament_id:document.getElementById("tournoiSelect").value
  });

  await tirage();
}

async function genererTour(current,next){
  await post("/generer-tour",{
    tournament_id:document.getElementById("tournoiSelect").value,
    current_round:current,
    next_round:next
  });

  await tirage();
}

checkStatus();

</script>

</body>
</html>
