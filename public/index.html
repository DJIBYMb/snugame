<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>SNUGAME</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#07111f;
  color:white;
}

header{
  background:linear-gradient(135deg,#1455ff,#7c2cff);
  padding:18px;
  text-align:center;
  position:sticky;
  top:0;
  z-index:10;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:16px;
}

.card{
  background:#152238;
  border:1px solid #263852;
  padding:18px;
  border-radius:16px;
  margin:14px 0;
}

input,
button{
  width:100%;
  padding:12px;
  margin:7px 0;
  border:none;
  border-radius:10px;
}

input{
  background:#263852;
  color:white;
}

button{
  background:#22c55e;
  color:#052e16;
  font-weight:bold;
  cursor:pointer;
}

.secondary{
  background:#3b82f6;
  color:white;
}

.warning{
  background:#f59e0b;
  color:#111827;
}

.hidden{
  display:none!important;
}

#message{
  white-space:pre-wrap;
  background:#020617;
  padding:12px;
  border-radius:12px;
  min-height:55px;
}

</style>

</head>

<body>

<header>

<h1>SNUGAME</h1>

<p>
Tournoi eFootball Mobile
</p>

</header>

<div class="container">

<section id="pageAuth">

<div class="card">

<h2>Connexion</h2>

<input
id="loginEmail"
placeholder="Adresse email">

<input
id="loginPassword"
type="password"
placeholder="Mot de passe">

<button onclick="login()">
Connexion
</button>

<button
class="secondary"
onclick="showRegister()">

Créer un compte

</button>

<button
class="warning"
onclick="showForgot()">

Mot de passe oublié

</button>

</div>

<div
class="card hidden"
id="registerBox">

<h2>Créer compte</h2>

<input
id="registerName"
placeholder="Nom">

<input
id="registerEmail"
placeholder="Adresse email">

<input
id="registerPassword"
type="password"
placeholder="Mot de passe">

<button onclick="register()">

Créer compte

</button>

</div>

<div
class="card hidden"
id="forgotBox">

<h2>Mot de passe oublié</h2>

<input
id="forgotEmail"
placeholder="Email du compte">

<button onclick="forgotPassword()">

Envoyer code

</button>

<input
id="resetCode"
placeholder="Code 6 chiffres">

<input
id="newPassword"
type="password"
placeholder="Nouveau mot de passe">

<button onclick="resetPassword()">

Changer mot de passe

</button>

</div>

</section>

<div class="card">

<h2>Message</h2>

<div id="message"></div>

</div>

</div>

<script>

async function post(url,data){

  const res = await fetch(url,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify(data)
  });

  const text = await res.text();

  document.getElementById("message").textContent = text;

  return text;

}

function showRegister(){

  document
  .getElementById("registerBox")
  .classList.toggle("hidden");

}

function showForgot(){

  document
  .getElementById("forgotBox")
  .classList.toggle("hidden");

}

async function register(){

  const result = await post("/register",{

    name:
    document.getElementById("registerName").value,

    email:
    document.getElementById("registerEmail").value,

    password:
    document.getElementById("registerPassword").value

  });

  if(
    result.includes("Compte")
    ||
    result.includes("créé")
  ){

    alert("Compte créé avec succès");

  }

}

async function login(){

  const result = await post("/login",{
    email:loginEmail.value,
    password:loginPassword.value
  });

  if(result.includes("Connexion")){
    setPage("pageDashboard");
    await chargerTournois();
  }
}

  

async function forgotPassword(){

  await post("/forgot-password",{

    email:
    document.getElementById("forgotEmail").value

  });

}

async function resetPassword(){

  await post("/reset-password",{

    email:
    document.getElementById("forgotEmail").value,

    code:
    document.getElementById("resetCode").value,

    newPassword:
    document.getElementById("newPassword").value

  });

}

</script>

</body>
</html>
